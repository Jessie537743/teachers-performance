<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Teachers logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>

  <!-- Graduation cap -->
  <g fill="#ffffff">
    <path d="M100 58 L38 84 L100 110 L162 84 Z"/>
    <path d="M62 96 V120 C62 130 80 138 100 138 C120 138 138 130 138 120 V96 L100 116 Z" opacity="0.92"/>
    <rect x="158" y="86" width="4" height="38" rx="2"/>
    <circle cx="160" cy="128" r="5"/>
  </g>

  <!-- Teachers wordmark -->
  <text x="100" y="170"
        text-anchor="middle"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="22"
        font-weight="700"
        letter-spacing="1"
        fill="#ffffff">Teachers</text>
</svg>
