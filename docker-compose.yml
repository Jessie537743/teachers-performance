services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tp-app
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - tp-network
    depends_on:
      db:
        condition: service_healthy
    # Local env vars (image's .env is dockerignored). Artisan inside the container
    # talks to the `db` service, not 127.0.0.1.
    environment:
      PORT: "80"
      APP_NAME: "Teachers Performance"
      APP_ENV: local
      APP_KEY: "base64:RQ+Na/FBpzNxL7AL9NfDMCy3pkq+5J53De9HoKDc+Rg="
      APP_DEBUG: "true"
      APP_URL: "http://localhost:8081"
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: teachers_performance
      DB_USERNAME: tp_user
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local
      MAIL_MAILER: log
      ML_API_URL: "http://ml-api:8000"

  db:
    image: mysql:8.0
    container_name: tp-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: teachers_performance
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: tp_user
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - tp-db-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - tp-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-api:
    build:
      context: ./ml_api
      dockerfile: Dockerfile
    container_name: tp-ml-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    networks:
      - tp-network

networks:
  tp-network:
    driver: bridge

volumes:
  tp-db-data:
